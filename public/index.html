<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manuālā validācija</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Formu validācijas pārbaude</h1>
    <p class="sub">Lapa manuālai validācijas un formu izkārtojuma pārbaudei.</p>

    <section class="grid">
      <article class="card fixedCard">
        <h2>Pievienot lietotāju</h2>
        <form id="userForm" novalidate>
          <label for="email">E-pasts</label>
          <input id="email" name="email" type="email" />

          <label for="password">Parole</label>
          <input id="password" name="password" type="password" />

          <button type="submit">Saglabāt lietotāju</button>
        </form>
        <div class="result" id="userResult"></div>
      </article>

      <article class="card fixedCard">
        <h2>Pieslēgšanās</h2>
        <form id="loginForm" novalidate>
          <label for="loginEmail">E-pasts</label>
          <input id="loginEmail" name="loginEmail" type="email" />

          <label for="loginPassword">Parole</label>
          <input id="loginPassword" name="loginPassword" type="password" />

          <div class="rowActions">
            <button type="submit">Ienākt</button>
            <button type="button" id="logoutBtn" class="secondaryBtn">Iziet</button>
          </div>
        </form>
        <div class="result" id="loginResult"></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="authState" id="authState">Nav autorizēta lietotāja</div>
        </div>
        <div id="loginGreeting" class="loginGreeting">
          <span id="greetingText"></span>
        </div>
      </article>

      <article class="card">
        <h2>Pievienot ziņu</h2>
        <form id="postForm" novalidate>
          <label for="title">Virsraksts</label>
          <input id="title" name="title" type="text" />

          <label for="content">Saturs</label>
          <textarea id="content" name="content"></textarea>

          <button type="submit">Saglabāt ziņu</button>
        </form>
        <div class="result" id="postResult"></div>
        <div id="postsList" class="postsList"></div>
      </article>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script>
    function setResult(element, ok, message) {
      element.className = ok ? 'result ok' : 'result error';
      element.textContent = message;
    }

    function getApiBaseUrl() {
      if (window.location.origin === 'null') {
        return 'http://localhost:3001';
      }

      if (window.location.port === '3001') {
        return '';
      }

      return 'http://localhost:3001';
    }

    const apiBaseUrl = getApiBaseUrl();
    let currentUserId = null;
    let currentUserEmail = null;

    // Mēģināt atjaunot sesiju no localStorage
    (function restoreSession() {
      try {
        const raw = localStorage.getItem('currentUser');
        if (raw) {
          const obj = JSON.parse(raw);
          if (obj && obj.id) {
            currentUserId = obj.id;
            currentUserEmail = obj.email || null;
          }
        }
      } catch (_e) {}
    })();

    function setButtonLoading(btn, text) {
      if (!btn) return;
      if (!btn.dataset.orig) btn.dataset.orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>${text}`;
    }

    function clearButtonLoading(btn) {
      if (!btn) return;
      btn.disabled = false;
      if (btn.dataset.orig) btn.innerHTML = btn.dataset.orig;
    }

    function setFieldError(input, isError) {
      if (!input) return;
      if (isError) {
        input.classList.add('input-error');
      } else {
        input.classList.remove('input-error');
      }
    }

    function clearRegistrationErrors() {
      setFieldError(document.getElementById('email'), false);
      setFieldError(document.getElementById('password'), false);
    }

    function applyRegistrationServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('email'), Boolean(details.email));
      setFieldError(document.getElementById('password'), Boolean(details.password));
    }

    function clearLoginErrors() {
      setFieldError(document.getElementById('loginEmail'), false);
      setFieldError(document.getElementById('loginPassword'), false);
    }

    function applyLoginServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('loginEmail'), Boolean(details.email));
      setFieldError(document.getElementById('loginPassword'), Boolean(details.password));
    }

    function clearPostErrors() {
      setFieldError(document.getElementById('title'), false);
      setFieldError(document.getElementById('content'), false);
    }

    function applyPostServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('title'), Boolean(details.title));
      setFieldError(document.getElementById('content'), Boolean(details.content));
    }

    async function writeLog(level, message) {
      try {
        await fetch(`${apiBaseUrl}/logs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level, message }),
        });
      } catch (_err) {
      }
    }

    function refreshAuthState() {
      const authState = document.getElementById('authState');
      const loginForm = document.getElementById('loginForm');
      const loginGreeting = document.getElementById('loginGreeting');
      const greetingText = document.getElementById('greetingText');
      const logoutInline = document.getElementById('logoutBtnInline');
      const logoutInlineExists = Boolean(logoutInline);
      const logoutFormBtn = document.getElementById('logoutBtn');

      if (currentUserId) {
        // Pēc pieslēgšanās: paslēgt pieteikšanās formu un statusu, rādīt sveicienu un izejas pogu
        if (authState) authState.style.display = 'none';
        if (loginForm) loginForm.style.display = 'none';
        if (logoutFormBtn) {
          logoutFormBtn.style.display = 'none';
          logoutFormBtn.disabled = true;
        }
        if (loginGreeting) {
          greetingText.textContent = `Sveicināts, ${currentUserEmail || 'lietotājs'}!`;
          loginGreeting.style.display = 'block';
        }
        // Notīrīt vecu kļūdas ziņu pie ziņas formas pēc autorizācijas
        try {
          const pr = document.getElementById('postResult');
          if (pr) {
            pr.textContent = '';
            pr.className = 'result';
          }
        } catch (_e) {}
        // Notīrīt pieteikšanās ziņojumu, ja tas ir palicis
        try { const lr = document.getElementById('loginResult'); if (lr) { lr.textContent = ''; lr.className = 'result'; } } catch (_e) {}
        if (logoutInlineExists) logoutInline.style.display = 'block';
        if (logoutInlineExists) logoutInline.disabled = false;
        return;
      }

      // Neautorizēts lietotājs: rādīt pieteikšanās formu un slēpt sveicienu
      if (authState) {
        authState.style.display = '';
        authState.textContent = 'Nav autorizēta lietotāja';
        authState.className = 'authState';
      }
      if (loginForm) loginForm.style.display = 'block';
      if (logoutFormBtn) {
        logoutFormBtn.style.display = 'inline-block';
        logoutFormBtn.disabled = true;
      }
      if (loginGreeting) loginGreeting.style.display = 'none';
      if (logoutInlineExists) {
        logoutInline.style.display = 'none';
        logoutInline.disabled = true;
      }
    }

    refreshAuthState();

    // Ielādēt ziņas pēc pilnīgas lapas ielādes (novērš sacensību sesijas atjaunošanas laikā)
    window.addEventListener('load', function () {
      try { refreshAuthState(); } catch (_e) {}
      if (currentUserId) {
        loadUserPosts(1).catch(() => {});
      }
    });

    // Nodrošināt, ka pieteikšanās forma vienmēr pieejama; parādīt sveicienu, kad pieslēgts

    function renderPost(post) {
      try { console.log('renderPost ->', post && (post.id || '(no id)'), post && post.title); } catch (_e) {}
      if (!post) return;
      const list = document.getElementById('postsList');
      if (!list) return;
      const item = document.createElement('div');
      item.className = 'postItem';

      const title = document.createElement('h3');
      title.className = 'postTitle';
      title.textContent = post.title && post.title.trim() ? post.title : 'Bez virsraksta';

      const body = document.createElement('div');
      body.className = 'postContent';
      const full = post.content || '';
      let toggle = null;
      // Tekstu ievietojam DOM, bet vizuāli ierobežojam līdz 2 rindām ar CSS
      body.textContent = full;
      body.dataset.full = full;
      if (full.length > 120) {
        body.classList.add('collapsed');
        body.dataset.collapsed = 'true';
        toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'toggleBtn';
          toggle.textContent = 'Rādīt vairāk';
        toggle.addEventListener('click', function () {
          const collapsed = body.dataset.collapsed === 'true';
          if (collapsed) {
            body.classList.remove('collapsed');
            body.dataset.collapsed = 'false';
              toggle.textContent = 'Rādīt mazāk';
          } else {
            body.classList.add('collapsed');
            body.dataset.collapsed = 'true';
              toggle.textContent = 'Rādīt vairāk';
          }
        });
      }

      // Meta (datums/laiks) pievienots beigās
      const meta = document.createElement('div');
      meta.className = 'postMeta';
      const created = post.createdAt || post.created_at || post.created || null;
      const when = created ? new Date(created).toLocaleString() : new Date().toLocaleString();
      meta.textContent = when;

      item.appendChild(title);
      item.appendChild(body);
      if (toggle) item.appendChild(toggle);
      item.appendChild(meta);

      list.appendChild(item);
      return item;
    }

    function clearPosts() {
      const list = document.getElementById('postsList');
      if (list) list.innerHTML = '';
    }

    let postsPage = 1;
    const postsPageSize = 1;

    async function renderPagination(page, hasNext) {
      const list = document.getElementById('postsList');
      if (!list) return;
      let pager = document.getElementById('postsPager');
      if (!pager) {
        pager = document.createElement('div');
        pager.id = 'postsPager';
        pager.style.marginTop = '8px';
        pager.style.display = 'flex';
        pager.style.justifyContent = 'center';
        pager.style.gap = '8px';
        pager.style.alignItems = 'center';
      }
      pager.innerHTML = '';

      const prev = document.createElement('button');
      prev.type = 'button';
      prev.textContent = 'Iepriekšējie';
      prev.disabled = page <= 1;
      prev.addEventListener('click', function () { loadUserPosts(page - 1).catch(() => {}); });
      pager.appendChild(prev);

      const next = document.createElement('button');
      next.type = 'button';
      next.textContent = 'Parādīt nākamās';
      next.style.marginLeft = '8px';
      next.disabled = !hasNext;
      next.addEventListener('click', function () { loadUserPosts(page + 1).catch(() => {}); });
      pager.appendChild(next);

      list.appendChild(pager);
    }

    async function loadUserPosts(page = 1) {
      try { console.log('loadUserPosts start, currentUserId=', currentUserId, 'page=', page); } catch(_e) {}
      postsPage = page;
      clearPosts();
      if (!currentUserId) return;
      try {
        const resp = await fetch(`${apiBaseUrl}/posts?userId=${encodeURIComponent(currentUserId)}&page=${page}&limit=${postsPageSize}`);
        try { console.log('loadUserPosts fetch status=', resp && resp.status); } catch(_e) {}
        if (!resp.ok) {
          const txt = await resp.text().catch(() => null);
          try { console.error('loadUserPosts error', resp.status, txt); } catch(_e) {}
          const list = document.getElementById('postsList');
          if (list) {
            const err = document.createElement('div');
            err.className = 'result error';
            err.textContent = 'Nevar ielādēt ziņas: servera kļūda. Klikšķiniet, lai mēģinātu vēlreiz.';
            const retry = document.createElement('button');
            retry.type = 'button';
            retry.textContent = 'Mēģināt vēlreiz';
            retry.style.marginLeft = '8px';
            retry.addEventListener('click', function () { loadUserPosts(page).catch(()=>{}); });
            err.appendChild(retry);
            list.appendChild(err);
          }
          return;
        }

        const body = await resp.json().catch(() => null);
        let arr = [];
        if (Array.isArray(body)) arr = body;
        else if (body && Array.isArray(body.data)) arr = body.data;
        try { console.log('loadUserPosts got posts count=', Array.isArray(arr) ? arr.length : 'not-array'); } catch(_e) {}
        if (!Array.isArray(arr)) return;

        arr.forEach(renderPost);

        const hasNext = arr.length === postsPageSize;
        await renderPagination(page, hasNext);
      } catch (_e) {
        // Ignorēt
      }
    }

    document.getElementById('userForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const result = document.getElementById('userResult');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');

      clearRegistrationErrors();


      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailInput, true);
        setResult(result, false, 'Kļūda: nepareizs e-pasta formāts.');
        return;
      }

      if (password.length < 8) {
        setFieldError(passwordInput, true);
        setResult(result, false, 'Kļūda: parolei jābūt vismaz 8 simboliem.');
        return;
      }

      // Nosūta datus uz serveri
      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Saglabā...');
        const resp = await fetch(`${apiBaseUrl}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 201) {
          currentUserId = body.id || null;
          currentUserEmail = email;
          try { localStorage.setItem('currentUser', JSON.stringify({ id: currentUserId, email: currentUserEmail })); } catch (_e) {}
          refreshAuthState();
          setResult(result, true, 'Lietotājs ir veiksmīgi izveidots.');
          // Notīrīt formu laukus (pieslēgšanās veiksmīga, sveiciens parādīts)
          try {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            if (emailInput) emailInput.value = '';
            if (passwordInput) passwordInput.value = '';
          } catch (_e) {}
          await writeLog('info', `Lietotājs reģistrēts: ${email}`);
          // Notīrīt iespējamos pieteikšanās ziņojumus (piem., nepareizs e-pasts)
          try { const lr = document.getElementById('loginResult'); if (lr) { lr.textContent = ''; lr.className = 'result'; } } catch (_e) {}
          try { await loadUserPosts(1); } catch (_e) {}
        } else if (resp.status === 400) {
          applyRegistrationServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else if (resp.status === 409) {
          setFieldError(emailInput, true);
          setResult(result, false, `Kļūda: e-pasts jau eksistē`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const result = document.getElementById('loginResult');
      const emailInput = document.getElementById('loginEmail');
      const passwordInput = document.getElementById('loginPassword');

      clearLoginErrors();

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailInput, true);
        setResult(result, false, 'Kļūda: nepareizs e-pasta formāts.');
        return;
      }

      if (password.length < 8) {
        setFieldError(passwordInput, true);
        setResult(result, false, 'Kļūda: parolei jābūt vismaz 8 simboliem.');
        return;
      }

      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Pieslēdzas...');
        const resp = await fetch(`${apiBaseUrl}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 200) {
          currentUserId = body.id;
          currentUserEmail = body.email;
          try { localStorage.setItem('currentUser', JSON.stringify({ id: currentUserId, email: currentUserEmail })); } catch (_e) {}
          refreshAuthState();
          setResult(result, true, 'Pieslēgšanās veiksmīga.');
          await writeLog('info', `Lietotājs pieslēdzās: ${body.email}`);
          try { await loadUserPosts(1); } catch (_e) {}
        } else if (resp.status === 401) {
          setFieldError(emailInput, true);
          setFieldError(passwordInput, true);
          setResult(result, false, body.message || 'Kļūda: nepareizs e-pasts vai parole, vai lietotājs neeksistē.');
          await writeLog('warn', `Neveiksmīga pieslēgšanās: ${email}`);
        } else if (resp.status === 404) {
          setResult(result, false, 'Kļūda: pieslēgšanās maršruts nav atrasts. Pārstartējiet serveri.');
        } else if (resp.status === 400) {
          applyLoginServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });

    function doLogout() {
      const previousEmail = currentUserEmail;
      currentUserId = null;
      currentUserEmail = null;
      try { localStorage.removeItem('currentUser'); } catch (_e) {}
      refreshAuthState();
      // Notīrīt ziņu sarakstu pēc iziešanas
      try { clearPosts(); } catch (_e) {}
      const lrEl = document.getElementById('loginResult');
      setResult(lrEl, true, 'Lietotājs ir atvienots.');
      try { if (lrEl) { lrEl.classList.add('manual-red'); } } catch(_e) {}
      if (previousEmail) {
        writeLog('info', `Lietotājs atvienojās: ${previousEmail}`);
      }
    }

    // Pievienot iziešanas funkciju pie pogām
    (function attachLogoutButtons() {
      const ids = ['logoutBtn', 'logoutBtnInline'];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('click', doLogout);
      });
    })();

    // Nodrošināt, ka iziešanas poga ir pieteikšanās kartē (apakšējā labajā stūrī)
    (function ensureInlineLogout() {
      const greeting = document.getElementById('loginGreeting');
      if (!greeting) return;
      let btn = document.getElementById('logoutBtnInline');
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'logoutBtnInline';
        btn.type = 'button';
        btn.className = 'secondaryBtn';
        btn.textContent = 'Iziet';
        btn.style.display = currentUserId ? 'block' : 'none';
        greeting.appendChild(btn);
        btn.addEventListener('click', doLogout);
      } else {
        btn.style.display = currentUserId ? 'block' : 'none';
        if (!greeting.contains(btn)) greeting.appendChild(btn);
      }
      try { refreshAuthState(); } catch (_e) {}
    })();

    document.getElementById('postForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const result = document.getElementById('postResult');
      const titleInput = document.getElementById('title');
      const contentInput = document.getElementById('content');

      clearPostErrors();

      if (!currentUserId) {
        setResult(result, false, 'Kļūda: vispirms ienāciet ar esošu kontu vai izveidojiet jaunu lietotāju.');
        return;
      }

      if (title.length < 3) {
        setFieldError(titleInput, true);
        setResult(result, false, 'Kļūda: virsrakstam jābūt vismaz 3 simboli.');
        return;
      }

      if (content.length < 10) {
        setFieldError(contentInput, true);
        setResult(result, false, 'Kļūda: saturam jābūt vismaz 10 simboli.');
        return;
      }

      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Saglabā ziņu...');
        const resp = await fetch(`${apiBaseUrl}/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, userId: currentUserId }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 201) {
          setResult(result, true, 'Ziņa ir veiksmīgi izveidota.');
          // Parādīt pievienoto ziņu saraksta apakšā
          try {
            const post = {
              id: body && body.id ? body.id : undefined,
              title: body && (body.title || body.Title) ? (body.title || body.Title) : title,
              content: body && (body.content || body.body || body.message) ? (body.content || body.body || body.message) : content,
              userId: body && body.userId ? body.userId : currentUserId,
              createdAt: body && (body.createdAt || body.created_at || body.created) ? (body.createdAt || body.created_at || body.created) : new Date().toISOString(),
            };
            // Atsvaidzināt pirmo lapu, lai lapošanas secība saglabātos
            try { await loadUserPosts(1); } catch (_e) {}
            // Notīrīt formu
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
          } catch (_e) {}
          await writeLog('info', `Izveidota ziņa no lietotāja: ${currentUserEmail || currentUserId}`);
        } else if (resp.status === 400) {
          applyPostServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });
  </script>
</body>
</html>
