<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manuālā validācija</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Formu validācijas pārbaude</h1>
    <p class="sub">Lapa manuālai validācijas un formu izkārtojuma pārbaudei.</p>

    <section class="grid">
      <article class="card">
        <h2>Pievienot lietotāju</h2>
        <form id="userForm" novalidate>
          <label for="email">E-pasts</label>
          <input id="email" name="email" type="email" />

          <label for="password">Parole</label>
          <input id="password" name="password" type="password" />

          <button type="submit">Saglabāt lietotāju</button>
        </form>
        <div class="result" id="userResult"></div>
        <div class="authState" id="authState">Nav autorizēta lietotāja</div>

        <h2 style="margin-top: 18px;">Pieslēgšanās</h2>
        <form id="loginForm" novalidate>
          <label for="loginEmail">E-pasts</label>
          <input id="loginEmail" name="loginEmail" type="email" />

          <label for="loginPassword">Parole</label>
          <input id="loginPassword" name="loginPassword" type="password" />

          <div class="rowActions">
            <button type="submit">Ienākt</button>
            <button type="button" id="logoutBtn" class="secondaryBtn">Iziet</button>
          </div>
        </form>
        <div class="result" id="loginResult"></div>
      </article>

      <article class="card">
        <h2>Pievienot ziņu</h2>
        <form id="postForm" novalidate>
          <label for="title">Virsraksts</label>
          <input id="title" name="title" type="text" />

          <label for="content">Saturs</label>
          <textarea id="content" name="content"></textarea>

          <button type="submit">Saglabāt ziņu</button>
        </form>
        <div class="result" id="postResult"></div>
      </article>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script>
    function setResult(element, ok, message) {
      element.className = ok ? 'result ok' : 'result error';
      element.textContent = message;
    }

    function getApiBaseUrl() {
      if (window.location.origin === 'null') {
        return 'http://localhost:3001';
      }

      if (window.location.port === '3001') {
        return '';
      }

      return 'http://localhost:3001';
    }

    const apiBaseUrl = getApiBaseUrl();
    let currentUserId = null;
    let currentUserEmail = null;

    function setButtonLoading(btn, text) {
      if (!btn) return;
      if (!btn.dataset.orig) btn.dataset.orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>${text}`;
    }

    function clearButtonLoading(btn) {
      if (!btn) return;
      btn.disabled = false;
      if (btn.dataset.orig) btn.innerHTML = btn.dataset.orig;
    }

    function setFieldError(input, isError) {
      if (!input) return;
      if (isError) {
        input.classList.add('input-error');
      } else {
        input.classList.remove('input-error');
      }
    }

    function clearRegistrationErrors() {
      setFieldError(document.getElementById('email'), false);
      setFieldError(document.getElementById('password'), false);
    }

    function applyRegistrationServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('email'), Boolean(details.email));
      setFieldError(document.getElementById('password'), Boolean(details.password));
    }

    function clearLoginErrors() {
      setFieldError(document.getElementById('loginEmail'), false);
      setFieldError(document.getElementById('loginPassword'), false);
    }

    function applyLoginServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('loginEmail'), Boolean(details.email));
      setFieldError(document.getElementById('loginPassword'), Boolean(details.password));
    }

    function clearPostErrors() {
      setFieldError(document.getElementById('title'), false);
      setFieldError(document.getElementById('content'), false);
    }

    function applyPostServerErrors(details) {
      if (!details || typeof details !== 'object') return;
      setFieldError(document.getElementById('title'), Boolean(details.title));
      setFieldError(document.getElementById('content'), Boolean(details.content));
    }

    async function writeLog(level, message) {
      try {
        await fetch(`${apiBaseUrl}/logs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level, message }),
        });
      } catch (_err) {
      }
    }

    function refreshAuthState() {
      const authState = document.getElementById('authState');
      const logoutBtn = document.getElementById('logoutBtn');

      if (currentUserId) {
        authState.textContent = `Autorizēts: ${currentUserEmail || 'lietotājs'}`;
        authState.className = 'authState ok';
        logoutBtn.disabled = false;
        return;
      }

      authState.textContent = 'Nav autorizēta lietotāja';
      authState.className = 'authState';
      logoutBtn.disabled = true;
    }

    refreshAuthState();

    document.getElementById('userForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const result = document.getElementById('userResult');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');

      clearRegistrationErrors();


      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailInput, true);
        setResult(result, false, 'Kļūda: nepareizs e-pasta formāts.');
        return;
      }

      if (password.length < 8) {
        setFieldError(passwordInput, true);
        setResult(result, false, 'Kļūda: parolei jābūt vismaz 8 simboliem.');
        return;
      }

      // Nosūta datus uz serveri
      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Saglabā...');
        const resp = await fetch(`${apiBaseUrl}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 201) {
          currentUserId = body.id || null;
          currentUserEmail = email;
          refreshAuthState();
          setResult(result, true, 'Lietotājs ir veiksmīgi izveidots.');
          await writeLog('info', `Lietotājs reģistrēts: ${email}`);
        } else if (resp.status === 400) {
          applyRegistrationServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else if (resp.status === 409) {
          setFieldError(emailInput, true);
          setResult(result, false, `Kļūda: e-pasts jau eksistē`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const result = document.getElementById('loginResult');
      const emailInput = document.getElementById('loginEmail');
      const passwordInput = document.getElementById('loginPassword');

      clearLoginErrors();

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError(emailInput, true);
        setResult(result, false, 'Kļūda: nepareizs e-pasta formāts.');
        return;
      }

      if (password.length < 8) {
        setFieldError(passwordInput, true);
        setResult(result, false, 'Kļūda: parolei jābūt vismaz 8 simboliem.');
        return;
      }

      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Pieslēdzas...');
        const resp = await fetch(`${apiBaseUrl}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 200) {
          currentUserId = body.id;
          currentUserEmail = body.email;
          refreshAuthState();
          setResult(result, true, 'Pieslēgšanās veiksmīga.');
          await writeLog('info', `Lietotājs pieslēdzās: ${body.email}`);
        } else if (resp.status === 401) {
          setFieldError(emailInput, true);
          setFieldError(passwordInput, true);
          setResult(result, false, body.message || 'Kļūda: nepareizs e-pasts vai parole, vai lietotājs neeksistē.');
          await writeLog('warn', `Neveiksmīga pieslēgšanās: ${email}`);
        } else if (resp.status === 404) {
          setResult(result, false, 'Kļūda: pieslēgšanās maršruts nav atrasts. Pārstartējiet serveri.');
        } else if (resp.status === 400) {
          applyLoginServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', function () {
      const previousEmail = currentUserEmail;
      currentUserId = null;
      currentUserEmail = null;
      refreshAuthState();
      setResult(document.getElementById('loginResult'), true, 'Lietotājs ir atvienots.');
      if (previousEmail) {
        writeLog('info', `Lietotājs atvienojās: ${previousEmail}`);
      }
    });

    document.getElementById('postForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const result = document.getElementById('postResult');
      const titleInput = document.getElementById('title');
      const contentInput = document.getElementById('content');

      clearPostErrors();

      if (title.length < 3) {
        setFieldError(titleInput, true);
        setResult(result, false, 'Kļūda: virsrakstam jābūt vismaz 3 simboli.');
        return;
      }

      if (content.length < 10) {
        setFieldError(contentInput, true);
        setResult(result, false, 'Kļūda: saturam jābūt vismaz 10 simboli.');
        return;
      }

      if (!currentUserId) {
        setResult(result, false, 'Kļūda: vispirms ienāciet ar esošu kontu vai izveidojiet jaunu lietotāju.');
        return;
      }

      const submitBtn = this.querySelector('button[type="submit"]');
      try {
        setButtonLoading(submitBtn, 'Saglabā ziņu...');
        const resp = await fetch(`${apiBaseUrl}/posts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, userId: currentUserId }),
        });

        const body = await resp.json().catch(() => ({}));

        if (resp.status === 201) {
          setResult(result, true, 'Ziņa ir veiksmīgi izveidota.');
          await writeLog('info', `Izveidota ziņa no lietotāja: ${currentUserEmail || currentUserId}`);
        } else if (resp.status === 400) {
          applyPostServerErrors(body.details || body);
          setResult(result, false, `VALIDĀCIJA: ${JSON.stringify(body.details || body)}`);
        } else {
          setResult(result, false, `Servera kļūda (${resp.status})`);
        }
      } catch (err) {
        setResult(result, false, `Savienojuma kļūda: ${err.message}`);
      } finally {
        clearButtonLoading(submitBtn);
      }
    });
  </script>
</body>
</html>
